<!DOCTYPE html>
<html>
<head>
<title>Speedster Sandbox</title>
<style>
body { margin:0; overflow:hidden; background:black; }
#ui {
  position:absolute;
  top:12px;
  left:12px;
  color:white;
  font-family:Arial;
  z-index:20;
}
</style>
</head>

<body>

<div id="ui">
⚡ Speedster Sandbox<br>
WASD move | Shift toggle speed | F dash
</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();

// ✅ FIXED FOG (was too dark before)
scene.fog = new THREE.Fog(0x050510, 80, 300);

// CAMERA
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,8,14);

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x0a0a1a); // ✅ brighter background
document.body.appendChild(renderer.domElement);

// ✅ STRONGER LIGHTING
scene.add(new THREE.AmbientLight(0xffffff,1.2));

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(50,100,50);
scene.add(light);

// GROUND
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshBasicMaterial({color:0x222244})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// PLAYER
const player = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshBasicMaterial({color:0xffff00})
);
player.position.y = 1;
scene.add(player);

// INPUT
let keys = {};
let sprinting = false;
let yaw = 0;

document.addEventListener("keydown", e=>{
  keys[e.key.toLowerCase()] = true;
  if(e.key === "Shift") sprinting = !sprinting;
});

document.addEventListener("keyup", e=>{
  keys[e.key.toLowerCase()] = false;
});

document.addEventListener("click", ()=>{
  document.body.requestPointerLock();
});

document.addEventListener("mousemove", e=>{
  if(document.pointerLockElement === document.body){
    yaw -= e.movementX * 0.0025;
  }
});

// LOOP
function animate(){
  requestAnimationFrame(animate);

  let speed = sprinting ? 0.4 : 0.15;

  const dir = new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
  const right = new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));

  let move = new THREE.Vector3();

  if(keys["w"]) move.add(dir);
  if(keys["s"]) move.sub(dir);
  if(keys["a"]) move.sub(right);
  if(keys["d"]) move.add(right);

  move.normalize().multiplyScalar(speed);
  player.position.add(move);

  if(move.length()>0){
    player.rotation.y = Math.atan2(move.x, move.z);
  }

  // CAMERA FOLLOW
  camera.position.set(
    player.position.x + Math.sin(yaw)*6,
    player.position.y + 4,
    player.position.z + Math.cos(yaw)*6
  );

  camera.lookAt(player.position);

  renderer.render(scene, camera);
}

animate();

// RESIZE
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
