<!DOCTYPE html>
<html>
<head>
<title>Street Survival Simulator</title>

<style>
body{
  background:#020617;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:30px;
}

h1{margin-bottom:20px;}

.stat{
  margin:8px;
  font-size:18px;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  cursor:pointer;
}

button:hover{
  background:#16a34a;
}

#log{
  margin-top:20px;
  background:#0f172a;
  padding:10px;
  border-radius:10px;
  height:150px;
  overflow:auto;
}

#gameOver{
  display:none;
  font-size:22px;
  margin-top:20px;
}
</style>
</head>

<body>

<h1>Street Survival Simulator</h1>

<div class="stat">❤️ Health: <span id="health"></span></div>
<div class="stat">⚡ Energy: <span id="energy"></span></div>
<div class="stat">🧠 Stability: <span id="mind"></span></div>
<div class="stat">💰 Money: <span id="money"></span></div>

<hr>

<button onclick="rest()">Rest</button>
<button onclick="work()">Work</button>
<button onclick="risk()">Take Risk</button>
<button onclick="recover()">Recover</button>

<div id="log"></div>

<div id="gameOver">
  <p id="endText"></p>
  <button onclick="restart()">Restart</button>
</div>

<script>
let health, energy, mind, money;
let alive = true;

// LOAD SAVE
function loadGame(){
  const save = JSON.parse(localStorage.getItem("save"));

  if(save){
    ({health,energy,mind,money} = save);
  } else {
    health=100; energy=100; mind=100; money=50;
  }
}

// SAVE GAME
function saveGame(){
  localStorage.setItem("save", JSON.stringify({
    health, energy, mind, money
  }));
}

function update(){
  document.getElementById("health").innerText=health;
  document.getElementById("energy").innerText=energy;
  document.getElementById("mind").innerText=mind;
  document.getElementById("money").innerText=money;

  saveGame();

  // 💀 LOSE
  if(health<=0 || mind<=0){
    endGame("You collapsed.");
  }

  // 🏆 WIN
  if(money >= 200){
    endGame("You escaped and made it out.");
  }
}

function log(text){
  document.getElementById("log").innerHTML += text+"<br>";
}

function clamp(){
  health = Math.max(0, Math.min(100, health));
  energy = Math.max(0, Math.min(100, energy));
  mind = Math.max(0, Math.min(100, mind));
}

// ACTIONS

function rest(){
  if(!alive) return;

  energy += 25;
  mind += 5;
  log("You rested.");
  clamp(); update();
}

function work(){
  if(!alive) return;

  energy -= 20;
  mind -= 5;
  money += 30;

  if(Math.random()<0.2){
    health -= 10;
    log("Work was exhausting.");
  } else {
    log("You worked and earned money.");
  }

  clamp(); update();
}

function risk(){
  if(!alive) return;

  let r = Math.random();

  if(r < 0.4){
    money += 60;
    health -= 20;
    log("Big reward but dangerous.");
  } else {
    health -= 30;
    mind -= 20;
    log("That went very bad.");
  }

  clamp(); update();
}

function recover(){
  if(!alive) return;

  if(money >= 20){
    money -= 20;
    mind += 30;
    health += 10;
    log("You took time to recover.");
  } else {
    log("Not enough money.");
  }

  clamp(); update();
}

// GAME END
function endGame(text){
  alive=false;
  document.getElementById("gameOver").style.display="block";
  document.getElementById("endText").innerText=text;
}

// RESTART
function restart(){
  localStorage.removeItem("save");
  location.reload();
}

// START
loadGame();
update();
</script>

</body>
</html>
