<!DOCTYPE html>
<html>
<head>
<title>Street Survival Simulator</title>
<style>
body { margin:0; overflow:hidden; background:black; }
#ui {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-family:Arial;
}
</style>
</head>

<body>

<div id="ui">
Click to start<br>
WASD move | Shift sprint | Space jump<br>
Reach the red marker<br>
</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

<script>
// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

// CAMERA
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

// RENDERER
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// CONTROLS
const controls = new THREE.PointerLockControls(camera, document.body);
document.addEventListener("click", () => controls.lock());
scene.add(controls.getObject());

// LIGHT
const light = new THREE.HemisphereLight(0xffffff,0x444444,1);
scene.add(light);

// FLOOR (CITY GROUND)
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshBasicMaterial({color:0x222222})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// BUILDINGS
for(let i=0;i<50;i++){
  const b = new THREE.Mesh(
    new THREE.BoxGeometry(2, Math.random()*8+2, 2),
    new THREE.MeshBasicMaterial({color:0x555555})
  );
  b.position.set(
    Math.random()*100-50,
    b.geometry.parameters.height/2,
    Math.random()*100-50
  );
  scene.add(b);
}

// NPCs
const npcs = [];
for(let i=0;i<5;i++){
  const npc = new THREE.Mesh(
    new THREE.BoxGeometry(1,2,1),
    new THREE.MeshBasicMaterial({color:0x00ffff})
  );
  npc.position.set(Math.random()*20-10,1,Math.random()*20-10);
  scene.add(npc);
  npcs.push(npc);
}

// MISSION TARGET
const target = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshBasicMaterial({color:0xff0000})
);
target.position.set(10,1,-10);
scene.add(target);

// PLAYER
camera.position.y = 1.6;

// MOVEMENT
let forward=false, back=false, left=false, right=false;
let velocityY = 0;
let onGround = true;
let sprint = false;

document.addEventListener("keydown", e=>{
  if(e.key==="w") forward=true;
  if(e.key==="s") back=true;
  if(e.key==="a") left=true;
  if(e.key==="d") right=true;
  if(e.key==="Shift") sprint=true;

  if(e.code==="Space" && onGround){
    velocityY = 0.2;
    onGround=false;
  }
});

document.addEventListener("keyup", e=>{
  if(e.key==="w") forward=false;
  if(e.key==="s") back=false;
  if(e.key==="a") left=false;
  if(e.key==="d") right=false;
  if(e.key==="Shift") sprint=false;
});

// LOOP
function animate(){
  requestAnimationFrame(animate);

  let speed = sprint ? 0.2 : 0.1;

  if(forward) controls.moveForward(speed);
  if(back) controls.moveForward(-speed);
  if(left) controls.moveRight(-speed);
  if(right) controls.moveRight(speed);

  // GRAVITY
  velocityY -= 0.01;
  camera.position.y += velocityY;

  if(camera.position.y <= 1.6){
    camera.position.y = 1.6;
    velocityY = 0;
    onGround = true;
  }

  // NPC MOVEMENT
  npcs.forEach(n=>{
    n.position.x += (Math.random()-0.5)*0.05;
    n.position.z += (Math.random()-0.5)*0.05;
  });

  // MISSION CHECK
  const dist = camera.position.distanceTo(target.position);
  if(dist < 2){
    alert("Mission complete!");
    target.position.set(
      Math.random()*50-25,
      1,
      Math.random()*50-25
    );
  }

  renderer.render(scene, camera);
}

animate();

// RESIZE
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
