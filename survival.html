<!DOCTYPE html>
<html>
<head>
<title>Flash Speed Game</title>
<style>
body { margin:0; overflow:hidden; background:black; }
#ui {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-family:Arial;
}
</style>
</head>

<body>

<div id="ui">
⚡ Flash Mode<br>
WASD move | Shift = speed burst<br>
Collect the orbs<br>
Score: <span id="score">0</span>
</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>

<script>

// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

// CAMERA
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.HemisphereLight(0xffffff,0x444444,1));

// GROUND
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({color:0x111111})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// PLAYER
const player = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({color:0xffff00})
);
player.position.y = 1;
scene.add(player);

// ORBS
const orbs = [];
for(let i=0;i<10;i++){
  const orb = new THREE.Mesh(
    new THREE.SphereGeometry(0.5),
    new THREE.MeshBasicMaterial({color:0x00ffff})
  );
  respawnOrb(orb);
  scene.add(orb);
  orbs.push(orb);
}

// LIGHTNING TRAIL
const trail = [];

function createTrail(){
  const part = new THREE.Mesh(
    new THREE.SphereGeometry(0.3),
    new THREE.MeshBasicMaterial({
      color:0x00ffff,
      transparent:true,
      opacity:0.8
    })
  );

  part.position.copy(player.position);
  scene.add(part);

  trail.push({mesh:part, life:1});
}

// SCORE
let score = 0;
function updateScore(){
  document.getElementById("score").innerText = score;
}

// RESPAWN
function respawnOrb(o){
  o.position.set(
    Math.random()*50-25,
    1,
    Math.random()*50-25
  );
}

// INPUT
let keys = {};
document.addEventListener("keydown", e=>keys[e.key]=true);
document.addEventListener("keyup", e=>keys[e.key]=false);

// CAMERA ROTATION
let yaw = 0;

document.addEventListener("click", ()=>{
  document.body.requestPointerLock();
});

document.addEventListener("mousemove", e=>{
  if(document.pointerLockElement === document.body){
    yaw -= e.movementX * 0.002;
  }
});

// LOOP
function animate(){
  requestAnimationFrame(animate);

  let baseSpeed = 0.15;
  let speed = keys["Shift"] ? 0.5 : baseSpeed;

  const dir = new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw));
  const right = new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));

  let move = new THREE.Vector3();

  if(keys["w"]) move.add(dir);
  if(keys["s"]) move.sub(dir);
  if(keys["a"]) move.sub(right);
  if(keys["d"]) move.add(right);

  move.normalize().multiplyScalar(speed);
  player.position.add(move);

  // TRAIL WHEN MOVING FAST
  if(move.length() > 0.05){
    createTrail();
  }

  // FADE TRAIL
  for(let i=trail.length-1;i>=0;i--){
    trail[i].life -= 0.03;
    trail[i].mesh.material.opacity = trail[i].life;

    if(trail[i].life <= 0){
      scene.remove(trail[i].mesh);
      trail.splice(i,1);
    }
  }

  // PLAYER ROTATE
  if(move.length()>0){
    player.rotation.y = Math.atan2(move.x, move.z);
  }

  // CAMERA FOLLOW
  const camOffset = new THREE.Vector3(
    Math.sin(yaw)*6,
    4,
    Math.cos(yaw)*6
  );
  camera.position.copy(player.position).add(camOffset);
  camera.lookAt(player.position);

  // ORB COLLECTION
  orbs.forEach(o=>{
    if(player.position.distanceTo(o.position) < 1.5){
      score++;
      updateScore();
      respawnOrb(o);
    }
  });

  renderer.render(scene, camera);
}

animate();

// RESIZE
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

</script>

</body>
</html>
