<!DOCTYPE html>
<html>
<head>
<title>Speedster Sandbox</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial, sans-serif;
}
#ui {
  position: absolute;
  top: 12px;
  left: 12px;
  color: white;
  z-index: 20;
  text-shadow: 0 0 8px rgba(0,0,0,0.8);
  line-height: 1.4;
}
#panel {
  margin-top: 8px;
  padding: 10px 12px;
  background: rgba(0,0,0,0.35);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  width: 250px;
}
.bar {
  width: 100%;
  height: 10px;
  background: rgba(255,255,255,0.12);
  border-radius: 999px;
  overflow: hidden;
  margin-top: 4px;
  margin-bottom: 8px;
}
.fill {
  height: 100%;
  width: 100%;
  background: linear-gradient(90deg, #7c3aed, #38bdf8);
}
#flash {
  position: fixed;
  inset: 0;
  background: white;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.08s ease;
  z-index: 10;
}
#crosshair {
  position: fixed;
  left: 50%;
  top: 50%;
  width: 8px;
  height: 8px;
  margin-left: -4px;
  margin-top: -4px;
  border: 1px solid rgba(255,255,255,0.55);
  border-radius: 50%;
  z-index: 15;
  pointer-events: none;
}
#message {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  color: white;
  z-index: 20;
  padding: 10px 14px;
  background: rgba(0,0,0,0.35);
  border-radius: 12px;
  opacity: 0;
  transition: opacity 0.2s ease;
}
</style>
</head>

<body>
<div id="ui">
  ⚡ Speedster Sandbox<br>
  WASD move | Shift toggle speed | F dash | E interact
  <div id="panel">
    <div>Mode: <span id="mode">OFF</span></div>
    <div>Score: <span id="score">0</span></div>
    <div>Race Progress: <span id="raceText">0 / 5</span></div>
    <div style="margin-top:8px;">Dash Cooldown</div>
    <div class="bar"><div id="dashFill" class="fill"></div></div>
    <div>Energy</div>
    <div class="bar"><div id="energyFill" class="fill"></div></div>
  </div>
</div>

<div id="crosshair"></div>
<div id="flash"></div>
<div id="message"></div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x050510, 30, 180);

const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(0, 6, 12);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(window.devicePixelRatio || 1);
document.body.appendChild(renderer.domElement);

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.75));
const hemi = new THREE.HemisphereLight(0x88aaff, 0x111122, 0.85);
scene.add(hemi);

// Ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(260, 260),
  new THREE.MeshBasicMaterial({ color: 0x101228 })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// Roads grid
function addRoad(x, z, w, h, color = 0x1d213d) {
  const road = new THREE.Mesh(
    new THREE.PlaneGeometry(w, h),
    new THREE.MeshBasicMaterial({ color })
  );
  road.rotation.x = -Math.PI / 2;
  road.position.set(x, 0.02, z);
  scene.add(road);
}
addRoad(0, 0, 220, 14);
addRoad(0, 0, 14, 220);
addRoad(0, 50, 220, 10);
addRoad(0, -50, 220, 10);
addRoad(50, 0, 10, 220);
addRoad(-50, 0, 10, 220);

// Simple city blocks
const buildings = [];
function addBuilding(x, z, w, h, d, color) {
  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, d),
    new THREE.MeshBasicMaterial({ color })
  );
  mesh.position.set(x, h / 2, z);
  scene.add(mesh);
  buildings.push({ mesh, w, d });
}
for (let bx = -80; bx <= 80; bx += 20) {
  for (let bz = -80; bz <= 80; bz += 20) {
    const nearRoad = Math.abs(bx) < 12 || Math.abs(bz) < 12 || Math.abs(bx) > 42 && Math.abs(bx) < 58 || Math.abs(bz) > 42 && Math.abs(bz) < 58;
    if (!nearRoad && Math.random() > 0.25) {
      addBuilding(
        bx + (Math.random() - 0.5) * 4,
        bz + (Math.random() - 0.5) * 4,
        8 + Math.random() * 4,
        10 + Math.random() * 35,
        8 + Math.random() * 4,
        new THREE.Color().setHSL(0.62 + Math.random() * 0.05, 0.35, 0.22).getHex()
      );
    }
  }
}

// Player
const player = new THREE.Group();

const body = new THREE.Mesh(
  new THREE.CapsuleGeometry(0.65, 1.5, 6, 10),
  new THREE.MeshBasicMaterial({ color: 0xfff066 })
);
body.position.y = 1.3;
player.add(body);

const head = new THREE.Mesh(
  new THREE.SphereGeometry(0.38, 16, 16),
  new THREE.MeshBasicMaterial({ color: 0xffe899 })
);
head.position.y = 2.45;
player.add(head);

scene.add(player);

// Aura
const aura = new THREE.Mesh(
  new THREE.SphereGeometry(2.2, 24, 24),
  new THREE.MeshBasicMaterial({
    color: 0x6d28d9,
    transparent: true,
    opacity: 0.08
  })
);
scene.add(aura);

// Energy ring
const energyRing = new THREE.Mesh(
  new THREE.RingGeometry(1.5, 2.25, 64),
  new THREE.MeshBasicMaterial({
    color: 0x7c3aed,
    transparent: true,
    opacity: 0.5,
    side: THREE.DoubleSide
  })
);
scene.add(energyRing);

// Inputs
let keys = {};
let sprinting = false;
let yaw = 0;
let energy = 100;
let dashCooldown = 0;
let score = 0;
let checkpointIndex = 0;

document.addEventListener("keydown", e => {
  const k = e.key.toLowerCase();
  keys[k] = true;
  if (e.key === "Shift") sprinting = !sprinting;
  if (k === "f") dash();
  if (k === "e") interact();
});
document.addEventListener("keyup", e => {
  keys[e.key.toLowerCase()] = false;
});

document.addEventListener("click", () => {
  document.body.requestPointerLock();
});

document.addEventListener("mousemove", e => {
  if (document.pointerLockElement === document.body) {
    yaw -= e.movementX * 0.0025;
  }
});

// Effects
let speedTrail = [];
let particles = [];
let lightningTrail = [];
let shockwaves = [];
let lastPos = new THREE.Vector3();
let lastMoveDir = new THREE.Vector3();
let targetFov = 75;

function flash() {
  const f = document.getElementById("flash");
  f.style.opacity = "0.35";
  setTimeout(() => f.style.opacity = "0", 80);
}

function showMessage(text) {
  const m = document.getElementById("message");
  m.textContent = text;
  m.style.opacity = "1";
  clearTimeout(showMessage._t);
  showMessage._t = setTimeout(() => {
    m.style.opacity = "0";
  }, 1200);
}

function createShockwave() {
  const wave = new THREE.Mesh(
    new THREE.RingGeometry(0.6, 1.2, 32),
    new THREE.MeshBasicMaterial({
      color: 0xffffff,
      transparent: true,
      opacity: 1,
      side: THREE.DoubleSide
    })
  );
  wave.rotation.x = -Math.PI / 2;
  wave.position.copy(player.position);
  wave.position.y = 0.06;
  scene.add(wave);
  shockwaves.push({ mesh: wave, life: 1, scale: 1 });
}

function createTrail() {
  const t = new THREE.Mesh(
    new THREE.CylinderGeometry(0.22, 0.55, 2.5, 10),
    new THREE.MeshBasicMaterial({
      color: 0x4488ff,
      transparent: true,
      opacity: 0.45
    })
  );
  t.rotation.x = Math.PI / 2;
  t.position.copy(player.position);
  t.position.y = 1.1;
  scene.add(t);
  speedTrail.push({ mesh: t, life: 1 });
}

function createParticle() {
  const p = new THREE.Mesh(
    new THREE.SphereGeometry(0.06, 8, 8),
    new THREE.MeshBasicMaterial({
      color: 0xa855f7,
      transparent: true,
      opacity: 1
    })
  );
  p.position.copy(player.position);
  p.position.y += 0.8 + Math.random() * 0.7;
  scene.add(p);
  particles.push({
    mesh: p,
    velocity: new THREE.Vector3(
      (Math.random() - 0.5) * 0.35,
      Math.random() * 0.18,
      (Math.random() - 0.5) * 0.35
    ),
    life: 1
  });
}

function createSpark() {
  const s = new THREE.Mesh(
    new THREE.SphereGeometry(0.09, 8, 8),
    new THREE.MeshBasicMaterial({
      color: 0x7dd3fc,
      transparent: true,
      opacity: 1
    })
  );
  s.position.copy(player.position);
  s.position.y = 0.1;
  scene.add(s);
  particles.push({
    mesh: s,
    velocity: new THREE.Vector3(
      (Math.random() - 0.5) * 0.3,
      Math.random() * 0.14,
      (Math.random() - 0.5) * 0.3
    ),
    life: 0.7
  });
}

function wrapLightning() {
  const geo = new THREE.TorusGeometry(1.15, 0.04, 8, 28);
  const mat = new THREE.MeshBasicMaterial({
    color: 0xa855f7,
    transparent: true,
    opacity: 0.6
  });
  const torus = new THREE.Mesh(geo, mat);
  torus.position.copy(player.position);
  torus.position.y += 1.1;
  torus.rotation.x = Math.random() * Math.PI;
  torus.rotation.z = Math.random() * Math.PI;
  scene.add(torus);
  lightningTrail.push({ mesh: torus, life: 0.42 });
}

function createLightning() {
  const points = [];
  const start = lastPos.clone();
  const end = player.position.clone();

  for (let i = 0; i <= 10; i++) {
    const t = i / 10;
    const base = start.clone().lerp(end, t);
    const offset = Math.sin(t * Math.PI * 4) * 0.18;
    base.x += offset;
    base.y += Math.sin(t * Math.PI * 2) * 0.09 + 0.8;
    base.z += offset * 0.5;
    points.push(base);
  }

  const curve = new THREE.CatmullRomCurve3(points);
  const smooth = curve.getPoints(20);
  const geo = new THREE.BufferGeometry().setFromPoints(smooth);

  const core = new THREE.Line(
    geo,
    new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 1 })
  );
  const glow = new THREE.Line(
    geo,
    new THREE.LineBasicMaterial({ color: 0x60a5fa, transparent: true, opacity: 0.65 })
  );
  glow.scale.set(1.3, 1.3, 1.3);

  scene.add(core);
  scene.add(glow);

  lightningTrail.push({ mesh: core, life: 1 });
  lightningTrail.push({ mesh: glow, life: 1 });
}

function dash() {
  if (dashCooldown > 0 || energy < 20) return;

  const dir = new THREE.Vector3(
    -Math.sin(yaw),
    0,
    -Math.cos(yaw)
  ).multiplyScalar(5);

  const next = player.position.clone().add(dir);
  if (!collides(next)) {
    player.position.copy(next);
  }

  energy -= 20;
  dashCooldown = 1.25;
  createShockwave();
  flash();
  for (let i = 0; i < 8; i++) createSpark();
}

function interact() {
  const cp = checkpoints[checkpointIndex];
  if (!cp) return;
  if (player.position.distanceTo(cp.position) < 3) {
    cp.material.color.set(0x22c55e);
    checkpointIndex++;
    updateRaceText();

    if (checkpointIndex >= checkpoints.length) {
      showMessage("Race complete");
      score += 100;
      updateScore();
      resetRace();
    } else {
      showMessage("Checkpoint reached");
    }
  }
}

function updateScore() {
  document.getElementById("score").textContent = score;
}
function updateRaceText() {
  document.getElementById("raceText").textContent = `${checkpointIndex} / ${checkpoints.length}`;
}
function updateBars() {
  document.getElementById("mode").textContent = sprinting ? "ON" : "OFF";
  document.getElementById("dashFill").style.width = `${Math.max(0, 100 - (dashCooldown / 1.25) * 100)}%`;
  document.getElementById("energyFill").style.width = `${energy}%`;
}

function collides(pos) {
  for (const b of buildings) {
    const bp = b.mesh.position;
    const hw = b.w * 0.5 + 0.9;
    const hd = b.d * 0.5 + 0.9;
    if (
      pos.x > bp.x - hw &&
      pos.x < bp.x + hw &&
      pos.z > bp.z - hd &&
      pos.z < bp.z + hd
    ) {
      return true;
    }
  }
  return false;
}

// Race checkpoints
const checkpoints = [];
function makeCheckpoint(x, z) {
  const mesh = new THREE.Mesh(
    new THREE.TorusGeometry(2.1, 0.18, 10, 32),
    new THREE.MeshBasicMaterial({ color: 0xef4444 })
  );
  mesh.position.set(x, 1.4, z);
  mesh.rotation.x = Math.PI / 2;
  scene.add(mesh);
  checkpoints.push(mesh);
}
makeCheckpoint(0, -30);
makeCheckpoint(30, -30);
makeCheckpoint(30, 30);
makeCheckpoint(-30, 30);
makeCheckpoint(-30, -10);
updateRaceText();

function resetRace() {
  checkpointIndex = 0;
  checkpoints.forEach(cp => cp.material.color.set(0xef4444));
  updateRaceText();
}

// XP pickups
const pickups = [];
function addPickup() {
  const p = new THREE.Mesh(
    new THREE.OctahedronGeometry(0.6),
    new THREE.MeshBasicMaterial({ color: 0x22d3ee })
  );
  p.position.set(
    Math.random() * 100 - 50,
    1.2,
    Math.random() * 100 - 50
  );
  scene.add(p);
  pickups.push(p);
}
for (let i = 0; i < 14; i++) addPickup();

function animate() {
  requestAnimationFrame(animate);

  lastPos.copy(player.position);

  const speed = sprinting ? 0.42 : 0.16;
  const dir = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
  const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));

  let move = new THREE.Vector3();
  if (keys["w"]) move.add(dir);
  if (keys["s"]) move.sub(dir);
  if (keys["a"]) move.sub(right);
  if (keys["d"]) move.add(right);

  if (move.length() > 0) {
    move.normalize().multiplyScalar(speed);
    const next = player.position.clone().add(move);
    if (!collides(next)) player.position.copy(next);
    player.rotation.y = Math.atan2(move.x, move.z);
  }

  // Energy regen/drain
  if (sprinting && move.length() > 0.03) {
    energy = Math.max(0, energy - 0.16);
    if (energy <= 0) sprinting = false;
  } else {
    energy = Math.min(100, energy + 0.08);
  }

  if (dashCooldown > 0) dashCooldown = Math.max(0, dashCooldown - 0.016);

  // Visual aura
  aura.position.copy(player.position);
  aura.position.y += 1.2;
  aura.material.opacity = sprinting ? 0.22 : 0.06;
  const pulse = 1 + Math.sin(Date.now() * 0.01) * 0.08;
  aura.scale.set(pulse, pulse, pulse);

  energyRing.position.copy(player.position);
  energyRing.position.y += 1.1;
  energyRing.rotation.y += 0.04;
  energyRing.rotation.x = Math.PI / 2;
  energyRing.scale.set(pulse, pulse, pulse);

  // Effects while sprinting
  if (sprinting && move.length() > 0.05) {
    createTrail();
    if (Math.random() < 0.8) createParticle();
    if (Math.random() < 0.28) wrapLightning();
    if (Math.random() < 0.45) createLightning();
  }

  // Turn sparks
  const currentDir = move.clone().normalize();
  if (currentDir.length() > 0) {
    if (lastMoveDir.length() > 0 && currentDir.dot(lastMoveDir) < 0.72) {
      for (let i = 0; i < 4; i++) createSpark();
    }
    lastMoveDir.copy(currentDir);
  }

  // Update beam trails
  for (let i = speedTrail.length - 1; i >= 0; i--) {
    const t = speedTrail[i];
    t.life -= 0.05;
    t.mesh.material.opacity = t.life * 0.55;
    t.mesh.scale.z += 0.45;
    if (t.life <= 0) {
      scene.remove(t.mesh);
      speedTrail.splice(i, 1);
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= 0.03;
    p.mesh.material.opacity = p.life;
    p.mesh.position.add(p.velocity);
    if (p.life <= 0) {
      scene.remove(p.mesh);
      particles.splice(i, 1);
    }
  }

  // Update lightning
  for (let i = lightningTrail.length - 1; i >= 0; i--) {
    const l = lightningTrail[i];
    l.life -= 0.05;
    if (l.mesh.material) l.mesh.material.opacity = l.life;
    if (l.life <= 0) {
      scene.remove(l.mesh);
      lightningTrail.splice(i, 1);
    }
  }

  if (!sprinting) {
    lightningTrail.forEach(l => scene.remove(l.mesh));
    lightningTrail = [];
  }

  // Update shockwaves
  for (let i = shockwaves.length - 1; i >= 0; i--) {
    const w = shockwaves[i];
    w.life -= 0.05;
    w.scale += 0.2;
    w.mesh.scale.set(w.scale, w.scale, w.scale);
    w.mesh.material.opacity = w.life;
    if (w.life <= 0) {
      scene.remove(w.mesh);
      shockwaves.splice(i, 1);
    }
  }

  // Pickups
  for (const p of pickups) {
    p.rotation.y += 0.04;
    p.position.y = 1.2 + Math.sin(Date.now() * 0.003 + p.position.x) * 0.16;
    if (player.position.distanceTo(p.position) < 1.6) {
      score += 10;
      updateScore();
      p.position.set(
        Math.random() * 100 - 50,
        1.2,
        Math.random() * 100 - 50
      );
      showMessage("+10 XP");
    }
  }

  // Checkpoint auto detect
  const cp = checkpoints[checkpointIndex];
  if (cp && player.position.distanceTo(cp.position) < 3) {
    cp.material.color.set(0x22c55e);
    checkpointIndex++;
    updateRaceText();
    if (checkpointIndex >= checkpoints.length) {
      score += 100;
      updateScore();
      showMessage("Race complete");
      resetRace();
    } else {
      showMessage("Checkpoint reached");
    }
  }

  // Camera + speed distortion
  targetFov = sprinting ? 90 : 75;
  camera.fov += (targetFov - camera.fov) * 0.1;
  camera.updateProjectionMatrix();

  const camDist = sprinting ? 7.4 : 6;
  const camHeight = sprinting ? 4.6 : 4;
  camera.position.set(
    player.position.x + Math.sin(yaw) * camDist,
    player.position.y + camHeight,
    player.position.z + Math.cos(yaw) * camDist
  );
  camera.lookAt(player.position.x, player.position.y + 1.2, player.position.z);

  updateBars();
  renderer.render(scene, camera);
}

animate();

window.addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
