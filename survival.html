<!DOCTYPE html>
<html>
<head>
<title>Street Survival Simulator</title>
<style>
body { margin:0; overflow:hidden; }
#ui {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-family:Arial;
}
</style>
</head>

<body>

<div id="ui">
  WASD to move<br>
  Click to look<br>
  Press E to interact
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";
import { PointerLockControls } from "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/controls/PointerLockControls.js";

// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

// CAMERA
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

// RENDERER
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// CONTROLS
const controls = new PointerLockControls(camera, document.body);
document.addEventListener("click", () => controls.lock());
scene.add(controls.getObject());

// LIGHT
const light = new THREE.PointLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

// FLOOR
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(50,50),
  new THREE.MeshBasicMaterial({color:0x111111})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// OBJECT (TASK)
const box = new THREE.Mesh(
  new THREE.BoxGeometry(),
  new THREE.MeshStandardMaterial({color:0x22c55e})
);
box.position.set(0,1,-5);
scene.add(box);

// PLAYER
camera.position.y = 1.6;

let moveForward=false, moveBack=false, moveLeft=false, moveRight=false;

// KEYS
document.addEventListener("keydown", e=>{
  if(e.key==="w") moveForward=true;
  if(e.key==="s") moveBack=true;
  if(e.key==="a") moveLeft=true;
  if(e.key==="d") moveRight=true;

  // INTERACT
  if(e.key==="e"){
    const distance = camera.position.distanceTo(box.position);
    if(distance < 2){
      alert("Task completed!");
      box.position.set(
        Math.random()*10-5,
        1,
        Math.random()*10-5
      );
    }
  }
});

document.addEventListener("keyup", e=>{
  if(e.key==="w") moveForward=false;
  if(e.key==="s") moveBack=false;
  if(e.key==="a") moveLeft=false;
  if(e.key==="d") moveRight=false;
});

// MOVEMENT
function animate(){
  requestAnimationFrame(animate);

  const speed = 0.1;

  if(moveForward) controls.moveForward(speed);
  if(moveBack) controls.moveForward(-speed);
  if(moveLeft) controls.moveRight(-speed);
  if(moveRight) controls.moveRight(speed);

  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
