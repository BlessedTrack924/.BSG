<!DOCTYPE html>
<html>
<head>
<title>Street Survival Simulator</title>
<style>
body { margin:0; overflow:hidden; background:black; }
#ui {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-family:Arial;
}
</style>
</head>

<body>

<div id="ui">
Click screen to start<br>
WASD to move<br>
Mouse to look<br>
Press E to interact
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>

<script>

// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

// CAMERA
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

// RENDERER
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// CONTROLS
const controls = new THREE.PointerLockControls(camera, document.body);

document.addEventListener("click", () => {
  controls.lock();
});

scene.add(controls.getObject());

// LIGHT
const light = new THREE.PointLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

// FLOOR
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(50,50),
  new THREE.MeshBasicMaterial({color:0x111111})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// OBJECT (TASK)
const box = new THREE.Mesh(
  new THREE.BoxGeometry(),
  new THREE.MeshBasicMaterial({color:0x22c55e})
);
box.position.set(0,1,-5);
scene.add(box);

// PLAYER HEIGHT
camera.position.y = 1.6;

// MOVEMENT
let forward=false, back=false, left=false, right=false;

document.addEventListener("keydown", e=>{
  if(e.key==="w") forward=true;
  if(e.key==="s") back=true;
  if(e.key==="a") left=true;
  if(e.key==="d") right=true;

  if(e.key==="e"){
    const dist = camera.position.distanceTo(box.position);
    if(dist < 2){
      alert("Task completed!");
      box.position.set(
        Math.random()*10-5,
        1,
        Math.random()*10-5
      );
    }
  }
});

document.addEventListener("keyup", e=>{
  if(e.key==="w") forward=false;
  if(e.key==="s") back=false;
  if(e.key==="a") left=false;
  if(e.key==="d") right=false;
});

// LOOP
function animate(){
  requestAnimationFrame(animate);

  const speed = 0.1;

  if(forward) controls.moveForward(speed);
  if(back) controls.moveForward(-speed);
  if(left) controls.moveRight(-speed);
  if(right) controls.moveRight(speed);

  renderer.render(scene, camera);
}

animate();

// FIX RESIZE
window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
