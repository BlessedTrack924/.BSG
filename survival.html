<!DOCTYPE html>
<html>
<head>
<title>Flash Speed Game</title>
<style>
body { margin:0; overflow:hidden; background:black; }
#ui {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-family:Arial;
  z-index:10;
}
#flash {
  position:fixed;
  inset:0;
  background:white;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.1s;
}
</style>
</head>

<body>

<div id="ui">
⚡ Flash Mode<br>
WASD move | Shift toggle speed<br>
F = Dash<br>
Score: <span id="score">0</span><br>
Speed: <span id="mode">OFF</span>
</div>

<div id="flash"></div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(0,5,10);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,1));

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(100,100),
  new THREE.MeshBasicMaterial({color:0x222244})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// PLAYER
const player = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshBasicMaterial({color:0xffff00})
);
player.position.y = 1;
scene.add(player);

// INPUT
let keys = {};
let sprinting = false;
let yaw = 0;
let score = 0;

document.addEventListener("keydown", e=>{
  keys[e.key.toLowerCase()] = true;

  if(e.key === "Shift"){
    sprinting = !sprinting;
  }

  if(e.key.toLowerCase() === "f"){
    dash();
  }
});

document.addEventListener("keyup", e=>{
  keys[e.key.toLowerCase()] = false;
});

document.addEventListener("click", ()=>{
  document.body.requestPointerLock();
});

document.addEventListener("mousemove", e=>{
  if(document.pointerLockElement === document.body){
    yaw -= e.movementX * 0.0025;
  }
});

// 💥 DASH
function dash(){
  const dir = new THREE.Vector3(
    -Math.sin(yaw),
    0,
    -Math.cos(yaw)
  ).multiplyScalar(4);

  player.position.add(dir);

  createShockwave();
  flash();
}

// ⚡ SHOCKWAVE
let shockwaves = [];

function createShockwave(){
  const wave = new THREE.Mesh(
    new THREE.RingGeometry(0.5,1,32),
    new THREE.MeshBasicMaterial({
      color:0xffffff,
      transparent:true,
      opacity:1,
      side:THREE.DoubleSide
    })
  );
  wave.rotation.x = -Math.PI/2;
  wave.position.copy(player.position);
  scene.add(wave);

  shockwaves.push({mesh:wave, life:1, scale:1});
}

// ⚡ LIGHTNING TRAIL
let lightningTrail = [];

function createLightning(){
  const geo = new THREE.BufferGeometry();
  const points = [];

  for(let i=0;i<5;i++){
    points.push(new THREE.Vector3(
      player.position.x + (Math.random()-0.5)*0.5,
      player.position.y + Math.random(),
      player.position.z + (Math.random()-0.5)*0.5
    ));
  }

  geo.setFromPoints(points);

  const mat = new THREE.LineBasicMaterial({
    color: new THREE.Color().setHSL(Math.random(),1,0.5),
    transparent:true,
    opacity:1
  });

  const line = new THREE.Line(geo, mat);
  scene.add(line);

  lightningTrail.push({mesh:line, life:1});
}

// FLASH EFFECT
function flash(){
  const f = document.getElementById("flash");
  f.style.opacity = "0.4";
  setTimeout(()=>f.style.opacity="0",100);
}

// LOOP
function animate(){
  requestAnimationFrame(animate);

  let speed = sprinting ? 0.4 : 0.15;

  const dir = new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
  const right = new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));

  let move = new THREE.Vector3();

  if(keys["w"]) move.add(dir);
  if(keys["s"]) move.sub(dir);
  if(keys["a"]) move.sub(right);
  if(keys["d"]) move.add(right);

  move.normalize().multiplyScalar(speed);
  player.position.add(move);

  if(move.length()>0){
    player.rotation.y = Math.atan2(move.x, move.z);
  }

  // ⚡ CREATE LIGHTNING
  if(sprinting && move.length()>0.05){
    createLightning();
  }

  // 💨 UPDATE LIGHTNING
  for(let i=lightningTrail.length-1;i>=0;i--){
    let l = lightningTrail[i];
    l.life -= 0.08;
    l.mesh.material.opacity = l.life;

    if(l.life <= 0){
      scene.remove(l.mesh);
      lightningTrail.splice(i,1);
    }
  }

  // 📴 CLEAR WHEN OFF
  if(!sprinting){
    lightningTrail.forEach(l=>scene.remove(l.mesh));
    lightningTrail = [];
  }

  // 💥 UPDATE SHOCKWAVE
  for(let i=shockwaves.length-1;i>=0;i--){
    let w = shockwaves[i];
    w.life -= 0.05;
    w.scale += 0.2;

    w.mesh.scale.set(w.scale,w.scale,w.scale);
    w.mesh.material.opacity = w.life;

    if(w.life <= 0){
      scene.remove(w.mesh);
      shockwaves.splice(i,1);
    }
  }

  // CAMERA
  camera.position.set(
    player.position.x + Math.sin(yaw)*6,
    player.position.y + 4,
    player.position.z + Math.cos(yaw)*6
  );

  camera.lookAt(player.position);

  renderer.render(scene, camera);

  document.getElementById("mode").innerText = sprinting ? "ON" : "OFF";
}

animate();

// RESIZE
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
