<!DOCTYPE html>
<html>
<head>
<title>Flash Final Polish</title>
<style>
body { margin:0; overflow:hidden; background:black; }
#ui {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-family:Arial;
  z-index:10;
}
#flash {
  position:fixed;
  inset:0;
  background:white;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.1s;
}
</style>
</head>

<body>

<div id="ui">
⚡ Flash Final Polish<br>
WASD move | Shift toggle speed<br>
F = Dash<br>
Speed: <span id="mode">OFF</span>
</div>

<div id="flash"></div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,5,10);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,1));

// GROUND
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(100,100),
  new THREE.MeshBasicMaterial({color:0x222244})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// PLAYER
const player = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshBasicMaterial({color:0xffff00})
);
player.position.y = 1;
scene.add(player);

// INPUT
let keys = {};
let sprinting = false;
let yaw = 0;

document.addEventListener("keydown", e=>{
  keys[e.key.toLowerCase()] = true;

  if(e.key === "Shift") sprinting = !sprinting;
  if(e.key.toLowerCase() === "f") dash();
});

document.addEventListener("keyup", e=>{
  keys[e.key.toLowerCase()] = false;
});

document.addEventListener("click", ()=>{
  document.body.requestPointerLock();
});

document.addEventListener("mousemove", e=>{
  if(document.pointerLockElement === document.body){
    yaw -= e.movementX * 0.0025;
  }
});

// 💥 DASH
function dash(){
  const dir = new THREE.Vector3(
    -Math.sin(yaw),
    0,
    -Math.cos(yaw)
  ).multiplyScalar(4);

  player.position.add(dir);
  createShockwave();
  flash();
}

// ⚡ SHOCKWAVE
let shockwaves = [];

function createShockwave(){
  const wave = new THREE.Mesh(
    new THREE.RingGeometry(0.5,1,32),
    new THREE.MeshBasicMaterial({
      color:0xffffff,
      transparent:true,
      opacity:1,
      side:THREE.DoubleSide
    })
  );
  wave.rotation.x = -Math.PI/2;
  wave.position.copy(player.position);
  scene.add(wave);

  shockwaves.push({mesh:wave, life:1, scale:1});
}

// ⚡ LIGHTNING
let lightningTrail = [];
let lastPos = new THREE.Vector3();

function createLightning(){
  const points = [];
  const start = lastPos.clone();
  const end = player.position.clone();

  for(let i=0;i<=10;i++){
    const t = i/10;

    const base = start.clone().lerp(end, t);

    const offset = Math.sin(t*Math.PI*4)*0.2;

    base.x += offset;
    base.y += Math.sin(t*Math.PI*2)*0.1;
    base.z += offset*0.5;

    points.push(base);
  }

  const curve = new THREE.CatmullRomCurve3(points);
  const smooth = curve.getPoints(20);

  const geo = new THREE.BufferGeometry().setFromPoints(smooth);

  const core = new THREE.Line(geo, new THREE.LineBasicMaterial({
    color:0xffffff,
    transparent:true,
    opacity:1
  }));

  const glow = new THREE.Line(geo, new THREE.LineBasicMaterial({
    color:0x66ccff,
    transparent:true,
    opacity:0.6
  }));

  glow.scale.set(1.4,1.4,1.4);

  scene.add(core);
  scene.add(glow);

  lightningTrail.push({mesh:core, life:1});
  lightningTrail.push({mesh:glow, life:1});
}

// ⚡ SPARKS
let sparks = [];

function createSpark(){
  const s = new THREE.Mesh(
    new THREE.SphereGeometry(0.08),
    new THREE.MeshBasicMaterial({color:0x88ccff, transparent:true, opacity:1})
  );

  s.position.copy(player.position);
  s.position.y = 0.1;

  scene.add(s);

  sparks.push({
    mesh:s,
    velocity:new THREE.Vector3(
      (Math.random()-0.5)*0.3,
      Math.random()*0.2,
      (Math.random()-0.5)*0.3
    ),
    life:1
  });
}

// FLASH
function flash(){
  const f = document.getElementById("flash");
  f.style.opacity = "0.4";
  setTimeout(()=>f.style.opacity="0",100);
}

// LOOP
let lastMoveDir = new THREE.Vector3();
let targetFov = 75;

function animate(){
  requestAnimationFrame(animate);

  lastPos.copy(player.position);

  let speed = sprinting ? 0.4 : 0.15;

  const dir = new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
  const right = new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));

  let move = new THREE.Vector3();

  if(keys["w"]) move.add(dir);
  if(keys["s"]) move.sub(dir);
  if(keys["a"]) move.sub(right);
  if(keys["d"]) move.add(right);

  move.normalize().multiplyScalar(speed);
  player.position.add(move);

  if(move.length()>0){
    player.rotation.y = Math.atan2(move.x, move.z);
  }

  // ⚡ LIGHTNING
  if(sprinting && move.length()>0.05){
    createLightning();
  }

  // TURN SPARKS
  let currentDir = move.clone().normalize();
  if(currentDir.length()>0){
    if(currentDir.dot(lastMoveDir) < 0.7){
      for(let i=0;i<5;i++) createSpark();
    }
    lastMoveDir.copy(currentDir);
  }

  // UPDATE LIGHTNING
  for(let i=lightningTrail.length-1;i>=0;i--){
    let l = lightningTrail[i];
    l.life -= 0.05;
    l.mesh.material.opacity = l.life;

    if(l.life <= 0){
      scene.remove(l.mesh);
      lightningTrail.splice(i,1);
    }
  }

  if(!sprinting){
    lightningTrail.forEach(l=>scene.remove(l.mesh));
    lightningTrail = [];
  }

  // UPDATE SPARKS
  for(let i=sparks.length-1;i>=0;i--){
    let s = sparks[i];
    s.life -= 0.04;
    s.mesh.material.opacity = s.life;
    s.mesh.position.add(s.velocity);

    if(s.life <= 0){
      scene.remove(s.mesh);
      sparks.splice(i,1);
    }
  }

  // UPDATE SHOCKWAVE
  for(let i=shockwaves.length-1;i>=0;i--){
    let w = shockwaves[i];
    w.life -= 0.05;
    w.scale += 0.2;

    w.mesh.scale.set(w.scale,w.scale,w.scale);
    w.mesh.material.opacity = w.life;

    if(w.life <= 0){
      scene.remove(w.mesh);
      shockwaves.splice(i,1);
    }
  }

  // FOV EFFECT
  targetFov = sprinting ? 90 : 75;
  camera.fov += (targetFov - camera.fov)*0.1;
  camera.updateProjectionMatrix();

  // CAMERA
  camera.position.set(
    player.position.x + Math.sin(yaw)*6,
    player.position.y + 4,
    player.position.z + Math.cos(yaw)*6
  );

  camera.lookAt(player.position);

  renderer.render(scene, camera);

  document.getElementById("mode").innerText = sprinting ? "ON" : "OFF";
}

animate();

window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
