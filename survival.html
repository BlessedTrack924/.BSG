<!DOCTYPE html>
<html>
<head>
<title>Third Person Game</title>
<style>
body { margin:0; overflow:hidden; background:black; }
#ui {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-family:Arial;
}
</style>
</head>

<body>

<div id="ui">
WASD move | Shift sprint | Space jump
</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>

<script>

// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

// CAMERA
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const light = new THREE.HemisphereLight(0xffffff,0x444444,1);
scene.add(light);

// GROUND
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({color:0x1a1a1a})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// PLAYER
const player = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({color:0x22c55e})
);
player.position.y = 1;
scene.add(player);

// BUILDINGS
const buildings = [];

for(let i=0;i<40;i++){
  const h = Math.random()*10+3;

  const b = new THREE.Mesh(
    new THREE.BoxGeometry(3,h,3),
    new THREE.MeshStandardMaterial({color:0x555555})
  );

  b.position.set(
    Math.random()*100-50,
    h/2,
    Math.random()*100-50
  );

  scene.add(b);
  buildings.push(b);
}

// TARGET
const target = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xff0000})
);
target.position.set(10,1,-10);
scene.add(target);

// MOVEMENT
let keys = {};
let velocityY = 0;
let onGround = true;

document.addEventListener("keydown", e=>keys[e.key]=true);
document.addEventListener("keyup", e=>keys[e.key]=false);

// COLLISION
function checkCollision(pos){
  for(let b of buildings){
    if(
      Math.abs(pos.x - b.position.x) < 2 &&
      Math.abs(pos.z - b.position.z) < 2
    ){
      return true;
    }
  }
  return false;
}

// LOOP
function animate(){
  requestAnimationFrame(animate);

  let speed = keys["Shift"] ? 0.2 : 0.1;

  let moveX = 0;
  let moveZ = 0;

  if(keys["w"]) moveZ -= speed;
  if(keys["s"]) moveZ += speed;
  if(keys["a"]) moveX -= speed;
  if(keys["d"]) moveX += speed;

  let newPos = player.position.clone();
  newPos.x += moveX;
  newPos.z += moveZ;

  if(!checkCollision(newPos)){
    player.position.copy(newPos);
  }

  // GRAVITY
  velocityY -= 0.01;
  player.position.y += velocityY;

  if(player.position.y <= 1){
    player.position.y = 1;
    velocityY = 0;
    onGround = true;
  }

  if(keys[" "] && onGround){
    velocityY = 0.2;
    onGround = false;
  }

  // CAMERA FOLLOW
  camera.position.x = player.position.x;
  camera.position.z = player.position.z + 5;
  camera.position.y = player.position.y + 3;

  camera.lookAt(player.position);

  // MISSION
  if(player.position.distanceTo(target.position) < 2){
    alert("Mission complete!");
    target.position.set(
      Math.random()*50-25,
      1,
      Math.random()*50-25
    );
  }

  renderer.render(scene, camera);
}

animate();

// RESIZE
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
