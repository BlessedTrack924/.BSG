<!DOCTYPE html>
<html>
<head>
<title>Flash Cinematic Build</title>
<style>
body { margin:0; overflow:hidden; background:black; }
#ui {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-family:Arial;
  z-index:10;
}
#flash {
  position:fixed;
  inset:0;
  background:white;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.1s;
}
</style>
</head>

<body>

<div id="ui">
⚡ Flash Cinematic<br>
WASD move | Shift toggle speed<br>
F = Dash<br>
Speed: <span id="mode">OFF</span>
</div>

<div id="flash"></div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,5,10);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,1));

// GROUND
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(100,100),
  new THREE.MeshBasicMaterial({color:0x111133})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// PLAYER
const player = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshBasicMaterial({color:0xffff00})
);
player.position.y = 1;
scene.add(player);

// 🌌 AURA
const aura = new THREE.Mesh(
  new THREE.SphereGeometry(2,32,32),
  new THREE.MeshBasicMaterial({
    color:0x6622ff,
    transparent:true,
    opacity:0.1
  })
);
scene.add(aura);

// 🌀 ENERGY RING
const ringGeo = new THREE.RingGeometry(1.5,2.2,64);
const ringMat = new THREE.MeshBasicMaterial({
  color:0x8844ff,
  transparent:true,
  opacity:0.5,
  side:THREE.DoubleSide
});
const energyRing = new THREE.Mesh(ringGeo, ringMat);
scene.add(energyRing);

// INPUT
let keys = {};
let sprinting = false;
let yaw = 0;

document.addEventListener("keydown", e=>{
  keys[e.key.toLowerCase()] = true;
  if(e.key === "Shift") sprinting = !sprinting;
  if(e.key.toLowerCase() === "f") dash();
});

document.addEventListener("keyup", e=>{
  keys[e.key.toLowerCase()] = false;
});

document.addEventListener("click", ()=>{
  document.body.requestPointerLock();
});

document.addEventListener("mousemove", e=>{
  if(document.pointerLockElement === document.body){
    yaw -= e.movementX * 0.0025;
  }
});

// 💥 DASH
let shockwaves = [];
function dash(){
  const dir = new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw)).multiplyScalar(4);
  player.position.add(dir);
  createShockwave();
  flash();
}

function createShockwave(){
  const wave = new THREE.Mesh(
    new THREE.RingGeometry(0.5,1,32),
    new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:1,side:THREE.DoubleSide})
  );
  wave.rotation.x = -Math.PI/2;
  wave.position.copy(player.position);
  scene.add(wave);
  shockwaves.push({mesh:wave, life:1, scale:1});
}

// ⚡ WRAP LIGHTNING
let lightningTrail = [];
function wrapLightning(){
  const geo = new THREE.TorusGeometry(1.2,0.05,8,32);
  const mat = new THREE.MeshBasicMaterial({
    color:0xaa66ff,
    transparent:true,
    opacity:0.6
  });

  const torus = new THREE.Mesh(geo, mat);
  torus.position.copy(player.position);
  torus.rotation.x = Math.random()*Math.PI;

  scene.add(torus);
  lightningTrail.push({mesh:torus, life:0.5});
}

// 💨 SPEED TRAIL
let speedTrail = [];
function createTrail(){
  const t = new THREE.Mesh(
    new THREE.CylinderGeometry(0.3,0.6,2,8),
    new THREE.MeshBasicMaterial({
      color:0x4488ff,
      transparent:true,
      opacity:0.4
    })
  );

  t.rotation.x = Math.PI/2;
  t.position.copy(player.position);

  scene.add(t);
  speedTrail.push({mesh:t, life:1});
}

// ✨ PARTICLES
let particles = [];
function createParticle(){
  const p = new THREE.Mesh(
    new THREE.SphereGeometry(0.05),
    new THREE.MeshBasicMaterial({
      color:0xaa66ff,
      transparent:true,
      opacity:1
    })
  );

  p.position.copy(player.position);

  scene.add(p);

  particles.push({
    mesh:p,
    velocity:new THREE.Vector3(
      (Math.random()-0.5)*0.4,
      Math.random()*0.3,
      (Math.random()-0.5)*0.4
    ),
    life:1
  });
}

// FLASH
function flash(){
  const f = document.getElementById("flash");
  f.style.opacity = "0.4";
  setTimeout(()=>f.style.opacity="0",100);
}

// LOOP
function animate(){
  requestAnimationFrame(animate);

  let speed = sprinting ? 0.4 : 0.15;

  const dir = new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
  const right = new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));

  let move = new THREE.Vector3();

  if(keys["w"]) move.add(dir);
  if(keys["s"]) move.sub(dir);
  if(keys["a"]) move.sub(right);
  if(keys["d"]) move.add(right);

  move.normalize().multiplyScalar(speed);
  player.position.add(move);

  if(move.length()>0){
    player.rotation.y = Math.atan2(move.x, move.z);
  }

  // 🌌 AURA + RING
  aura.position.copy(player.position);
  aura.material.opacity = sprinting ? 0.35 : 0.1;

  const pulse = 1 + Math.sin(Date.now()*0.01)*0.1;
  aura.scale.set(pulse,pulse,pulse);

  energyRing.position.copy(player.position);
  energyRing.rotation.y += 0.05;
  energyRing.rotation.x = Math.PI/2;
  energyRing.scale.set(pulse,pulse,pulse);

  // ⚡ EFFECTS
  if(sprinting && move.length()>0.05){
    createTrail();
    createParticle();

    if(Math.random()<0.3){
      wrapLightning();
    }
  }

  // 💨 TRAIL UPDATE
  for(let i=speedTrail.length-1;i>=0;i--){
    let t = speedTrail[i];
    t.life -= 0.05;
    t.mesh.material.opacity = t.life*0.6;
    t.mesh.scale.z += 0.5;

    if(t.life <= 0){
      scene.remove(t.mesh);
      speedTrail.splice(i,1);
    }
  }

  // ✨ PARTICLES UPDATE
  for(let i=particles.length-1;i>=0;i--){
    let p = particles[i];
    p.life -= 0.03;
    p.mesh.material.opacity = p.life;
    p.mesh.position.add(p.velocity);

    if(p.life <= 0){
      scene.remove(p.mesh);
      particles.splice(i,1);
    }
  }

  // ⚡ LIGHTNING UPDATE
  for(let i=lightningTrail.length-1;i>=0;i--){
    let l = lightningTrail[i];
    l.life -= 0.05;
    l.mesh.material.opacity = l.life;

    if(l.life <= 0){
      scene.remove(l.mesh);
      lightningTrail.splice(i,1);
    }
  }

  // 📴 CLEAR WHEN OFF
  if(!sprinting){
    lightningTrail.forEach(l=>scene.remove(l.mesh));
    lightningTrail = [];
  }

  // 💥 SHOCKWAVE
  for(let i=shockwaves.length-1;i>=0;i--){
    let w = shockwaves[i];
    w.life -= 0.05;
    w.scale += 0.2;

    w.mesh.scale.set(w.scale,w.scale,w.scale);
    w.mesh.material.opacity = w.life;

    if(w.life <= 0){
      scene.remove(w.mesh);
      shockwaves.splice(i,1);
    }
  }

  // CAMERA
  camera.position.set(
    player.position.x + Math.sin(yaw)*6,
    player.position.y + 4,
    player.position.z + Math.cos(yaw)*6
  );

  camera.lookAt(player.position);

  renderer.render(scene, camera);

  document.getElementById("mode").innerText = sprinting ? "ON" : "OFF";
}

animate();

window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
