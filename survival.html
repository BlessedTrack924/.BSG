<!DOCTYPE html>
<html>
<head>
<title>Street Survival Simulator</title>
<style>
body { margin:0; overflow:hidden; background:black; }
#ui {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-family:Arial;
}
</style>
</head>

<body>

<div id="ui">
Click to start<br>
WASD move | Shift sprint | Space jump<br>
Reach the red marker
</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

<script>
// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0a);

// CAMERA
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// CONTROLS
const controls = new THREE.PointerLockControls(camera, document.body);
document.addEventListener("click", () => controls.lock());
scene.add(controls.getObject());

// LIGHTING (better visuals)
const hemi = new THREE.HemisphereLight(0xffffff,0x444444,1);
scene.add(hemi);

// GROUND
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({color:0x1a1a1a})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ROADS
const road = new THREE.Mesh(
  new THREE.PlaneGeometry(200,20),
  new THREE.MeshStandardMaterial({color:0x333333})
);
road.rotation.x = -Math.PI/2;
scene.add(road);

// BUILDINGS (with collision)
const buildings = [];

for(let i=0;i<40;i++){
  const height = Math.random()*10+3;

  const b = new THREE.Mesh(
    new THREE.BoxGeometry(3,height,3),
    new THREE.MeshStandardMaterial({color:0x555555})
  );

  b.position.set(
    Math.random()*100-50,
    height/2,
    Math.random()*100-50
  );

  scene.add(b);
  buildings.push(b);
}

// TARGET
const target = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xff0000})
);
target.position.set(10,1,-10);
scene.add(target);

// PLAYER
camera.position.y = 1.6;

// MOVEMENT
let forward=false, back=false, left=false, right=false, sprint=false;
let velocity = new THREE.Vector3();
let canJump = true;

document.addEventListener("keydown", e=>{
  if(e.key==="w") forward=true;
  if(e.key==="s") back=true;
  if(e.key==="a") left=true;
  if(e.key==="d") right=true;
  if(e.key==="Shift") sprint=true;

  if(e.code==="Space" && canJump){
    velocity.y = 0.2;
    canJump = false;
  }
});

document.addEventListener("keyup", e=>{
  if(e.key==="w") forward=false;
  if(e.key==="s") back=false;
  if(e.key==="a") left=false;
  if(e.key==="d") right=false;
  if(e.key==="Shift") sprint=false;
});

// COLLISION CHECK
function checkCollision(pos){
  for(let b of buildings){
    if(
      Math.abs(pos.x - b.position.x) < 2 &&
      Math.abs(pos.z - b.position.z) < 2
    ){
      return true;
    }
  }
  return false;
}

// LOOP
function animate(){
  requestAnimationFrame(animate);

  let speed = sprint ? 0.2 : 0.1;

  let move = new THREE.Vector3();

  if(forward) move.z -= speed;
  if(back) move.z += speed;
  if(left) move.x -= speed;
  if(right) move.x += speed;

  // APPLY ROTATION
  const direction = new THREE.Vector3();
  controls.getDirection(direction);

  const rightVec = new THREE.Vector3();
  rightVec.crossVectors(direction, new THREE.Vector3(0,1,0));

  let newPos = camera.position.clone();
  newPos.add(direction.multiplyScalar(-move.z));
  newPos.add(rightVec.multiplyScalar(move.x));

  if(!checkCollision(newPos)){
    camera.position.copy(newPos);
  }

  // GRAVITY
  velocity.y -= 0.01;
  camera.position.y += velocity.y;

  if(camera.position.y <= 1.6){
    camera.position.y = 1.6;
    velocity.y = 0;
    canJump = true;
  }

  // MISSION
  if(camera.position.distanceTo(target.position) < 2){
    alert("Mission Complete!");
    target.position.set(Math.random()*50-25,1,Math.random()*50-25);
  }

  renderer.render(scene, camera);
}

animate();

// RESIZE
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
