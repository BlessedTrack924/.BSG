<!DOCTYPE html>
<html>
<head>
<title>Flash Speed Game</title>
<style>
body { margin:0; overflow:hidden; background:black; }
#ui {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-family:Arial;
}
</style>
</head>

<body>

<div id="ui">
⚡ Flash Mode<br>
WASD move | Shift = toggle speed<br>
F = Dash<br>
</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>

<script>

// SCENE
const scene = new THREE.Scene();

// CAMERA
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,5,10);

// RENDERER
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff,1));

// GROUND
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(100,100),
  new THREE.MeshBasicMaterial({color:0x222222})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// PLAYER
const player = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshBasicMaterial({color:0xffff00})
);
player.position.y = 1;
scene.add(player);

// INPUT
let keys = {};
let sprinting = false;

document.addEventListener("keydown", e=>{
  keys[e.key] = true;

  if(e.key === "Shift"){
    sprinting = !sprinting;
  }

  // 💥 DASH (F KEY)
  if(e.key === "f"){
    dash();
  }
});

document.addEventListener("keyup", e=>{
  keys[e.key] = false;
});

// CAMERA ROTATION
let yaw = 0;

document.addEventListener("click", ()=>{
  document.body.requestPointerLock();
});

document.addEventListener("mousemove", e=>{
  if(document.pointerLockElement === document.body){
    yaw -= e.movementX * 0.002;
  }
});

// ⚡ LIGHTNING TRAIL
let trailPoints = [];
let trailMax = 25;

const trailMaterial = new THREE.LineBasicMaterial({
  color:0xffff00,
  transparent:true,
  opacity:0.9
});

let trailLine = new THREE.Line(
  new THREE.BufferGeometry(),
  trailMaterial
);
scene.add(trailLine);

// 🌈 COLOR SYSTEM
let hue = 0;

// 💥 DASH FUNCTION
function dash(){
  const dashDir = new THREE.Vector3(
    -Math.sin(yaw),
    0,
    -Math.cos(yaw)
  );

  dashDir.multiplyScalar(3);
  player.position.add(dashDir);
}

// LOOP
function animate(){
  requestAnimationFrame(animate);

  let speed = sprinting ? 0.4 : 0.15;

  const dir = new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
  const right = new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));

  let move = new THREE.Vector3();

  if(keys["w"]) move.add(dir);
  if(keys["s"]) move.sub(dir);
  if(keys["a"]) move.sub(right);
  if(keys["d"]) move.add(right);

  move.normalize().multiplyScalar(speed);
  player.position.add(move);

  // ⚡ COLOR SHIFT
  if(sprinting){
    hue += 0.03;
    const color = new THREE.Color().setHSL(hue % 1, 1, 0.5);
    trailMaterial.color = color;
  } else {
    trailMaterial.color.set(0xffff00);
  }

  // ⚡ TRAIL
  if(move.length() > 0.05){
    trailPoints.push(player.position.clone());

    if(trailPoints.length > trailMax){
      trailPoints.shift();
    }

    const geo = new THREE.BufferGeometry().setFromPoints(trailPoints);
    trailLine.geometry.dispose();
    trailLine.geometry = geo;
  }

  // CAMERA FOLLOW
  camera.position.set(
    player.position.x + Math.sin(yaw)*6,
    player.position.y + 4,
    player.position.z + Math.cos(yaw)*6
  );

  camera.lookAt(player.position);

  renderer.render(scene, camera);
}

animate();

// RESIZE
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(inner
