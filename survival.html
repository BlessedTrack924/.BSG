<!DOCTYPE html>
<html>
<head>
<title>Third Person Game</title>
<style>
body { margin:0; overflow:hidden; background:black; }
#ui {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-family:Arial;
}
</style>
</head>

<body>

<div id="ui">
Click screen<br>
WASD move | Shift sprint | Space jump<br>
Move mouse to rotate camera
</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>

<script>

// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

// CAMERA
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const light = new THREE.HemisphereLight(0xffffff,0x444444,1);
scene.add(light);

// GROUND
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({color:0x1a1a1a})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// PLAYER
const player = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({color:0x22c55e})
);
player.position.y = 1;
scene.add(player);

// BUILDINGS
const buildings = [];

for(let i=0;i<40;i++){
  const h = Math.random()*10+3;

  const b = new THREE.Mesh(
    new THREE.BoxGeometry(3,h,3),
    new THREE.MeshStandardMaterial({color:0x555555})
  );

  b.position.set(
    Math.random()*100-50,
    h/2,
    Math.random()*100-50
  );

  scene.add(b);
  buildings.push(b);
}

// TARGET
const target = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xff0000})
);
target.position.set(10,1,-10);
scene.add(target);

// INPUT
let keys = {};
document.addEventListener("keydown", e=>keys[e.key]=true);
document.addEventListener("keyup", e=>keys[e.key]=false);

// CAMERA ROTATION
let yaw = 0;
let pitch = 0;

document.addEventListener("click", ()=>{
  document.body.requestPointerLock();
});

document.addEventListener("mousemove", e=>{
  if(document.pointerLockElement === document.body){
    yaw -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;

    pitch = Math.max(-1.2, Math.min(1.2, pitch));
  }
});

// PHYSICS
let velocityY = 0;
let onGround = true;

// COLLISION
function checkCollision(pos){
  for(let b of buildings){
    if(
      Math.abs(pos.x - b.position.x) < 2 &&
      Math.abs(pos.z - b.position.z) < 2
    ){
      return true;
    }
  }
  return false;
}

// LOOP
function animate(){
  requestAnimationFrame(animate);

  let speed = keys["Shift"] ? 0.2 : 0.1;

  // DIRECTION BASED ON CAMERA
  const dir = new THREE.Vector3(
    Math.sin(yaw),
    0,
    Math.cos(yaw)
  );

  const right = new THREE.Vector3(
    Math.cos(yaw),
    0,
    -Math.sin(yaw)
  );

  let move = new THREE.Vector3();

  if(keys["w"]) move.add(dir);
  if(keys["s"]) move.sub(dir);
  if(keys["a"]) move.sub(right);
  if(keys["d"]) move.add(right);

  move.normalize().multiplyScalar(speed);

  let newPos = player.position.clone().add(move);

  if(!checkCollision(newPos)){
    player.position.copy(newPos);
  }

  // PLAYER ROTATION
  if(move.length() > 0){
    player.rotation.y = Math.atan2(move.x, move.z);
  }

  // GRAVITY
  velocityY -= 0.01;
  player.position.y += velocityY;

  if(player.position.y <= 1){
    player.position.y = 1;
    velocityY = 0;
    onGround = true;
  }

  if(keys[" "] && onGround){
    velocityY = 0.2;
    onGround = false;
  }

  // CAMERA FOLLOW
  const camOffset = new THREE.Vector3(
    Math.sin(yaw)*5,
    3 + pitch*2,
    Math.cos(yaw)*5
  );

  camera.position.copy(player.position).add(camOffset);
  camera.lookAt(player.position);

  // MISSION
  if(player.position.distanceTo(target.position) < 2){
    alert("Mission complete!");
    target.position.set(
      Math.random()*50-25,
      1,
      Math.random()*50-25
    );
  }

  renderer.render(scene, camera);
}

animate();

// RESIZE
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

</script>

</body>
</html>
