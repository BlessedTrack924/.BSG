<!DOCTYPE html>
<html>
<head>
<title>Flash Game</title>
<style>
body { margin:0; overflow:hidden; background:black; }
#ui {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-family:Arial;
}
</style>
</head>

<body>

<div id="ui">
⚡ Flash Mode<br>
WASD move | Shift toggle speed<br>
Click to lock mouse
</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>

<script>

// SCENE
const scene = new THREE.Scene();

// CAMERA
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,5,10); // 🔥 IMPORTANT

// RENDERER
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// 🔥 STRONG LIGHT (FIX)
const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(5,10,5);
scene.add(light);

// 🔥 ADD AMBIENT LIGHT
scene.add(new THREE.AmbientLight(0xffffff, 1));

// GROUND (VISIBLE MATERIAL)
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(100,100),
  new THREE.MeshBasicMaterial({color:0x333333})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// PLAYER (BRIGHT MATERIAL)
const player = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshBasicMaterial({color:0xffff00})
);
player.position.y = 1;
scene.add(player);

// CAMERA ROTATION
let yaw = 0;

document.addEventListener("click", ()=>{
  document.body.requestPointerLock();
});

document.addEventListener("mousemove", e=>{
  if(document.pointerLockElement === document.body){
    yaw -= e.movementX * 0.002;
  }
});

// INPUT
let keys = {};
let sprinting = false;

document.addEventListener("keydown", e=>{
  keys[e.key] = true;
  if(e.key === "Shift"){
    sprinting = !sprinting;
  }
});

document.addEventListener("keyup", e=>{
  keys[e.key] = false;
});

// LOOP
function animate(){
  requestAnimationFrame(animate);

  let speed = sprinting ? 0.4 : 0.15;

  const dir = new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
  const right = new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));

  let move = new THREE.Vector3();

  if(keys["w"]) move.add(dir);
  if(keys["s"]) move.sub(dir);
  if(keys["a"]) move.sub(right);
  if(keys["d"]) move.add(right);

  move.normalize().multiplyScalar(speed);
  player.position.add(move);

  // CAMERA FOLLOW
  camera.position.set(
    player.position.x + Math.sin(yaw)*6,
    player.position.y + 4,
    player.position.z + Math.cos(yaw)*6
  );

  camera.lookAt(player.position);

  renderer.render(scene, camera);
}

animate();

</script>

</body>
</html>
