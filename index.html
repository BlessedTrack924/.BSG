<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSMG - Game Hub</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top, #020617, #020617 60%, #000000);
  color:white;
  display:flex;
}

.sidebar{
  width:220px;
  background:#020617;
  border-right:1px solid #1e293b;
  padding:20px;
  height:100vh;
}
.sidebar button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:black;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}
.sidebar button:hover{
  background:#16a34a;
  transform:scale(1.05);
}

.main{flex:1;padding:20px;}

.card{background:#0f172a;padding:15px;margin:10px 0;border-radius:10px;}
.userBox{background:#1e293b;padding:10px;margin:10px 0;border-radius:10px;}

input,button{padding:10px;margin:5px;border-radius:8px;border:none;}

#coins{
  transition:all 0.2s ease;
  text-shadow:0 0 10px rgba(255,215,0,0.7);
}

.featuredGame{
  position:relative;
  margin-bottom:30px;
  border-radius:15px;
  overflow:hidden;
}
.featuredImg{
  width:100%;
  height:200px;
  object-fit:cover;
  filter:brightness(0.6);
}
.featuredOverlay{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:20px;
}
.featuredOverlay h1{margin:0;font-size:28px;}

.gameGrid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.gameCard{
  background:#0f172a;
  padding:15px;
  border-radius:12px;
  text-align:center;
  transition:0.25s;
  position:relative;
  overflow:hidden;
}
.gameCard::before{
  content:"";
  position:absolute;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background:linear-gradient(120deg, transparent, rgba(34,197,94,0.2), transparent);
  transform:rotate(25deg);
  opacity:0;
  transition:0.3s;
}
.gameCard:hover::before{opacity:1;}
.gameCard:hover{
  transform:translateY(-5px) scale(1.05);
  box-shadow:0 10px 25px rgba(34,197,94,0.3);
}

.gameImg{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>BSMG</h2>
  <button onclick="showDashboard()">Dashboard</button>
  <button onclick="showGames()">Games</button>
  <button onclick="showLogin()">Login</button>
  <button onclick="showSignup()">Signup</button>
</div>

<div class="main">

<div id="dashboard">
  <h1>Big Steins Games</h1>
  <div class="card">🪙 Coins: <span id="coins">0</span></div>

  <div id="adminPanel" class="card" style="display:none;">
    <h3>Admin Dashboard</h3>
    <div id="adminUsers"></div>

    <h3>Game Prices</h3>

    <div class="userBox">
      Clicker:
      <input id="set-clicker">
      <button onclick="setPrice('clicker')">Set</button>
    </div>

    <div class="userBox">
      Kart:
      <input id="set-kart">
      <button onclick="setPrice('kart')">Set</button>
    </div>

    <div class="userBox">
      Survival:
      <input id="set-survival">
      <button onclick="setPrice('survival')">Set</button>
    </div>
  </div>
</div>

<div id="games" style="display:none;">

  <div class="featuredGame">
    <img src="https://images.unsplash.com/photo-1606813907291-d86efa9b94db?q=80&w=1200" class="featuredImg">
    <div class="featuredOverlay">
      <h1>Kart Racing</h1>
      <button onclick="openKart()">Play Now</button>
    </div>
  </div>

  <h2>🎮 Game Library</h2>

  <div class="gameGrid">

    <div class="gameCard">
      <img src="https://images.unsplash.com/photo-1611996575749-79a3a250f948?q=80&w=800" class="gameImg">
      <h3>Big Stein Clicker</h3>
      <p>Cost: <span id="price-clicker">0</span> coins</p>
      <button onclick="openGame()">Play</button>
    </div>

    <div class="gameCard">
      <img src="https://images.unsplash.com/photo-1606813907291-d86efa9b94db?q=80&w=800" class="gameImg">
      <h3>Kart Racing</h3>
      <p>Cost: <span id="price-kart">0</span> coins</p>
      <button onclick="openKart()">Play</button>
    </div>

    <div class="gameCard">
      <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=800" class="gameImg">
      <h3>Street Survival Simulator</h3>
      <p>Cost: <span id="price-survival">0</span> coins</p>
      <button onclick="openSurvival()">Play</button>
    </div>

  </div>

  <p id="gameMessage"></p>
</div>

<div id="login" style="display:none;" class="card">
  <input id="loginUsername" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="loginUser()">Login</button>
</div>

<div id="signup" style="display:none;" class="card">
  <input id="username" placeholder="Username">
  <input id="newPassword" type="password" placeholder="Password">
  <button onclick="signupUser()">Signup</button>
</div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://wcexpxchtcsalxbjizmn.supabase.co",
  "sb_publishable_i7VgJlJ5CuO-LblxQ67ItQ_kR9KGkat"
);

let user=null, coins=0, isAdmin=false, prices={};

function el(id){return document.getElementById(id);}
function fakeEmail(u){return u.toLowerCase()+"@bsmg.local";}

function hideAll(){["dashboard","games","login","signup"].forEach(id=>el(id).style.display="none");}
window.showDashboard=()=>{hideAll();el("dashboard").style.display="block";}
window.showGames=()=>{hideAll();el("games").style.display="block";}
window.showLogin=()=>{hideAll();el("login").style.display="block";}
window.showSignup=()=>{hideAll();el("signup").style.display="block";}

function animateCoins(){
  const c=el("coins");
  c.style.transform="scale(1.3)";
  c.style.color="#22c55e";
  setTimeout(()=>{c.style.transform="scale(1)";c.style.color="white";},200);
}

function updateUI(){el("coins").innerText=coins;}

async function loadPrices(){
  const {data}=await supabase.from("games").select("*");
  data.forEach(g=>prices[g.id]=g.price);
  el("price-clicker").innerText=prices.clicker||0;
  el("price-kart").innerText=prices.kart||0;
  el("price-survival").innerText=prices.survival||0;
}

window.signupUser=async()=>{
  const u=el("username").value;
  const p=el("newPassword").value;

  const {data,error}=await supabase.auth.signUp({email:fakeEmail(u),password:p});
  if(error){alert(error.message);return;}

  await supabase.from("users").insert({
    id:data.user.id,username:u,coins:0,is_admin:false,banned:false
  });

  alert("Account created");
};

window.loginUser=async()=>{
  const u=el("loginUsername").value;
  const p=el("password").value;

  const {data,error}=await supabase.auth.signInWithPassword({
    email:fakeEmail(u),password:p
  });

  if(error){alert(error.message);return;}

  user=data.user;

  const {data:rows}=await supabase.from("users").select("*").eq("id",user.id);
  const me=rows[0];

  coins=me.coins||0;
  isAdmin=me.is_admin;

  if(isAdmin){el("adminPanel").style.display="block";loadUsers();}
  await loadPrices();

  updateUI();
  showDashboard();
};

async function loadUsers(){
  const {data}=await supabase.from("users").select("*");
  el("adminUsers").innerHTML="";
  data.forEach(u=>{
    el("adminUsers").innerHTML+=`
    <div class="userBox">
      ${u.username} (${u.coins})
      <input id="c-${u.id}">
      <button onclick="setCoins('${u.id}')">Set</button>
    </div>`;
  });
}

window.setCoins=async(id)=>{
  const v=parseFloat(el("c-"+id).value);
  await supabase.from("users").update({coins:v}).eq("id",id);
  if(user && id===user.id){coins=v;updateUI();animateCoins();}
  loadUsers();
};

window.setPrice=async(id)=>{
  const v=parseFloat(el("set-"+id).value);
  await supabase.from("games").update({price:v}).eq("id",id);
  prices[id]=v;
  loadPrices();
};

window.openGame=async()=>{
  if(coins<prices.clicker){el("gameMessage").innerText="Need "+prices.clicker;return;}
  coins-=prices.clicker;updateUI();animateCoins();
  await supabase.from("users").update({coins}).eq("id",user.id);
  window.open("https://epsteinclicker.github.io/");
};

window.openKart=async()=>{
  if(coins<prices.kart){el("gameMessage").innerText="Need "+prices.kart;return;}
  coins-=prices.kart;updateUI();animateCoins();
  await supabase.from("users").update({coins}).eq("id",user.id);
  window.open("https://mkpc.malahieude.net/");
};

window.openSurvival=async()=>{
  if(coins<prices.survival){el("gameMessage").innerText="Need "+prices.survival;return;}
  coins-=prices.survival;updateUI();animateCoins();
  await supabase.from("users").update({coins}).eq("id",user.id);
  window.open("survival.html","_blank");
};

supabase.channel('coins')
.on('postgres_changes',{event:'UPDATE',schema:'public',table:'users'},payload=>{
  if(user && payload.new.id===user.id){
    coins=payload.new.coins;
    updateUI();
    animateCoins();
  }
})
.subscribe();
</script>

</body>
</html>
