<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Big Steins Movies and Games</title>

  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#020617;
      color:white;
      display:flex;
    }

    .sidebar{
      width:220px;
      background:#020617;
      border-right:1px solid #1e293b;
      padding:20px;
      height:100vh;
      box-sizing:border-box;
    }

    .sidebar h2{
      color:#22c55e;
      margin-top:0;
    }

    .sidebar button{
      width:100%;
      margin-top:10px;
      padding:10px;
      border:none;
      border-radius:8px;
      background:#22c55e;
      color:black;
      font-weight:bold;
      cursor:pointer;
    }

    .main{
      flex:1;
      padding:20px;
      box-sizing:border-box;
      overflow:auto;
    }

    .logo-bar{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:20px;
    }

    .logo{
      width:40px;
      height:40px;
      border-radius:50%;
    }

    .card{
      background:#0f172a;
      padding:15px;
      margin:10px 0;
      border-radius:10px;
    }

    .userBox{
      background:#1e293b;
      padding:10px;
      margin:10px 0;
      border-radius:10px;
    }

    input, button{
      padding:10px;
      margin:5px;
      border-radius:8px;
      border:none;
      box-sizing:border-box;
    }

    input{
      background:white;
      color:black;
    }

    .small{
      opacity:.75;
      font-size:14px;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <h2>BSMG</h2>
    <button onclick="showDashboard()">Dashboard</button>
    <button onclick="showGames()">Games</button>
    <button onclick="showSettings()">Settings</button>
    <button onclick="showLogin()">Login</button>
    <button onclick="showSignup()">Signup</button>
    <button onclick="logoutUser()">Logout</button>
  </div>

  <div class="main">

    <!-- DASHBOARD -->
    <div id="dashboard">
      <div class="logo-bar">
        <img src="BSC.png" class="logo" alt="Logo">
        <h1>Big Steins Movies and Games</h1>
      </div>

      <div class="card">
        <strong>Coins:</strong> <span id="coins">0</span>
      </div>

      <!-- ADMIN DASHBOARD -->
      <div id="adminPanel" class="card" style="display:none;">
        <h3>Admin Dashboard</h3>
        <div id="adminUsers"></div>
      </div>
    </div>

    <!-- GAMES -->
    <div id="games" style="display:none;">
      <div class="card">
        <h3>Clicker Game</h3>
        <p class="small">Costs 25 coins</p>
        <button onclick="openClickerGame()">Play 🎮</button>
        <p id="gameMessage"></p>
      </div>

      <div class="card">
        <h3>Video Hub</h3>
        <button onclick="window.open('videos.html','_blank')">Open Video Hub 🎬</button>
      </div>
    </div>

    <!-- SETTINGS -->
    <div id="settings" style="display:none;">
      <div class="card">
        <h3>Change Username</h3>
        <input id="newUsername" placeholder="New username">
        <button onclick="changeUsername()">Update</button>
      </div>

      <div class="card">
        <h3>Change Password</h3>
        <input id="newPass" type="password" placeholder="New password">
        <button onclick="changePassword()">Update</button>
      </div>

      <p id="settingsMessage"></p>
    </div>

    <!-- LOGIN -->
    <div id="login" style="display:none;" class="card">
      <input id="loginUsername" placeholder="Username">
      <input id="password" type="password" placeholder="Password">
      <button onclick="loginUser()">Login</button>
    </div>

    <!-- SIGNUP -->
    <div id="signup" style="display:none;" class="card">
      <input id="username" placeholder="Username">
      <input id="newPassword" type="password" placeholder="Password">
      <button onclick="signupUser()">Signup</button>
    </div>

  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      "YOUR_SUPABASE_URL_HERE",
      "YOUR_SUPABASE_ANON_KEY_HERE"
    );

    let user = null;
    let coins = 0;
    let isAdmin = false;

    function el(id){
      return document.getElementById(id);
    }

    function fakeEmail(username){
      return username.trim().toLowerCase().replace(/[^a-z0-9_]/g, "_") + "@bsmg.local";
    }

    function hideAll(){
      ["dashboard","games","settings","login","signup"].forEach(id=>{
        el(id).style.display = "none";
      });
    }

    window.showDashboard = () => {
      hideAll();
      el("dashboard").style.display = "block";
    };

    window.showGames = () => {
      hideAll();
      el("games").style.display = "block";
    };

    window.showSettings = () => {
      hideAll();
      el("settings").style.display = "block";
    };

    window.showLogin = () => {
      hideAll();
      el("login").style.display = "block";
    };

    window.showSignup = () => {
      hideAll();
      el("signup").style.display = "block";
    };

    window.logoutUser = async () => {
      await supabase.auth.signOut();
      location.reload();
    };

    function updateUI(){
      el("coins").innerText = coins;
    }

    async function saveCoins(){
      if(!user) return;
      await supabase.from("users").update({ coins }).eq("id", user.id);
    }

    window.signupUser = async () => {
      const username = el("username").value.trim();
      const password = el("newPassword").value;
      const email = fakeEmail(username);

      if(!username || !password){
        alert("Enter a username and password");
        return;
      }

      const { data, error } = await supabase.auth.signUp({
        email,
        password
      });

      if(error){
        alert(error.message);
        return;
      }

      const { error: insertError } = await supabase.from("users").insert({
        id: data.user.id,
        username,
        coins: 0,
        is_admin: false,
        banned: false
      });

      if(insertError){
        alert(insertError.message);
        return;
      }

      alert("Account created");
    };

    window.loginUser = async () => {
      const username = el("loginUsername").value.trim();
      const password = el("password").value;
      const email = fakeEmail(username);

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if(error){
        alert(error.message);
        return;
      }

      user = data.user;

      const { data: rows, error: rowError } = await supabase
        .from("users")
        .select("*")
        .eq("id", user.id);

      if(rowError || !rows || rows.length === 0){
        alert("User row not found");
        return;
      }

      const me = rows[0];

      if(me.banned){
        alert("You are banned");
        return;
      }

      coins = me.coins || 0;
      isAdmin = !!me.is_admin;

      if(isAdmin){
        el("adminPanel").style.display = "block";
        loadUsers();
      } else {
        el("adminPanel").style.display = "none";
      }

      updateUI();
      showDashboard();
    };

    async function loadUsers(){
      const { data, error } = await supabase.from("users").select("*");
      if(error || !data) return;

      el("adminUsers").innerHTML = "";

      data.forEach(u => {
        const d = document.createElement("div");
        d.className = "userBox";
        d.innerHTML = `
          <strong>${u.username}</strong><br>
          Coins: ${u.coins}<br>

          <input id="coins-${u.id}" placeholder="Set coins">
          <button onclick="setCoins('${u.id}')">Set Coins</button>

          <button onclick="toggleBan('${u.id}', ${u.banned})">
            ${u.banned ? "Unban" : "Ban"}
          </button>
        `;
        el("adminUsers").appendChild(d);
      });
    }

    window.setCoins = async (id) => {
      if(!isAdmin) return;

      const value = parseFloat(el("coins-" + id).value);
      if(isNaN(value)) return;

      await supabase.from("users").update({ coins: value }).eq("id", id);
      loadUsers();

      if(user && id === user.id){
        coins = value;
        updateUI();
      }
    };

    window.toggleBan = async (id, banned) => {
      if(!isAdmin) return;

      if(user && id === user.id){
        alert("You can't ban yourself");
        return;
      }

      await supabase.from("users").update({ banned: !banned }).eq("id", id);
      loadUsers();
    };

    window.openClickerGame = async () => {
      const cost = 25;

      if(coins < cost){
        el("gameMessage").innerText = "Need 25 coins";
        return;
      }

      coins -= cost;
      updateUI();
      await saveCoins();

      const win = window.open("https://epsteinclicker.github.io/","_blank");

      if(!win){
        coins += cost;
        updateUI();
        await saveCoins();
        el("gameMessage").innerText = "Allow popups to open the game";
      }
    };

    window.changeUsername = async () => {
      if(!user) return;

      const name = el("newUsername").value.trim();
      if(!name) return;

      await supabase.from("users").update({ username: name }).eq("id", user.id);
      el("settingsMessage").innerText = "Username updated";
    };

    window.changePassword = async () => {
      if(!user) return;

      const pass = el("newPass").value;
      if(!pass) return;

      const { error } = await supabase.auth.updateUser({ password: pass });

      if(error){
        el("settingsMessage").innerText = error.message;
      } else {
        el("settingsMessage").innerText = "Password updated";
      }
    };

    updateUI();
    showDashboard();
  </script>
</body>
</html>
