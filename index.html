<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Big Steins Games</title>

<style>
body{margin:0;font-family:Arial;background:#020617;color:white;display:flex;}
.sidebar{width:220px;background:#020617;border-right:1px solid #1e293b;padding:20px;height:100vh;}
.sidebar button{width:100%;margin-top:10px;padding:10px;border:none;border-radius:8px;background:#22c55e;color:black;font-weight:bold;cursor:pointer;}
.main{flex:1;padding:20px;}

.card{background:#0f172a;padding:15px;margin:10px 0;border-radius:10px;}
.userBox{background:#1e293b;padding:10px;margin:10px 0;border-radius:10px;}

input,button{padding:10px;margin:5px;border-radius:8px;border:none;}
button{background:#22c55e;cursor:pointer;}

#coins{
  transition: all 0.2s ease;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>BSMG</h2>
  <button onclick="showDashboard()">Dashboard</button>
  <button onclick="showGames()">Games</button>
  <button onclick="showLogin()">Login</button>
  <button onclick="showSignup()">Signup</button>
</div>

<div class="main">

<div id="dashboard">
  <h1>Big Steins Games</h1>
  <div class="card">
    🪙 Coins: <span id="coins">0</span>
  </div>

  <div id="adminPanel" class="card" style="display:none;">
    <h3>Admin Dashboard</h3>
    <div id="adminUsers"></div>
  </div>
</div>

<div id="games" style="display:none;">
  <div class="card">
    <h3>Clicker Game</h3>
    <p>Costs 25 coins</p>
    <button onclick="openGame()">Play 🎮</button>
    <p id="gameMessage"></p>
  </div>
</div>

<div id="login" style="display:none;" class="card">
  <input id="loginUsername" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="loginUser()">Login</button>
</div>

<div id="signup" style="display:none;" class="card">
  <input id="username" placeholder="Username">
  <input id="newPassword" type="password" placeholder="Password">
  <button onclick="signupUser()">Signup</button>
</div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://wcexpxchtcsalxbjizmn.supabase.co",
  "sb_publishable_i7VgJlJ5CuO-LblxQ67ItQ_kR9KGkat"
);

let user=null, coins=0, isAdmin=false;

function el(id){return document.getElementById(id);}
function fakeEmail(u){return u.toLowerCase()+"@bsmg.local";}

// NAV
function hideAll(){
  ["dashboard","games","login","signup"].forEach(id=>{
    el(id).style.display="none";
  });
}
window.showDashboard=()=>{hideAll();el("dashboard").style.display="block";}
window.showGames=()=>{hideAll();el("games").style.display="block";}
window.showLogin=()=>{hideAll();el("login").style.display="block";}
window.showSignup=()=>{hideAll();el("signup").style.display="block";}

// ANIMATION
function animateCoins(){
  const c = el("coins");
  c.style.transform = "scale(1.3)";
  c.style.color = "#22c55e";

  setTimeout(()=>{
    c.style.transform = "scale(1)";
    c.style.color = "white";
  },200);
}

// UI
function updateUI(){
  el("coins").innerText = coins;
}

// SIGNUP
window.signupUser=async()=>{
  const u=el("username").value;
  const p=el("newPassword").value;

  const {data,error}=await supabase.auth.signUp({
    email:fakeEmail(u),password:p
  });

  if(error){alert("SIGNUP ERROR: "+error.message);return;}

  const { error: insertError } = await supabase.from("users").insert({
    id:data.user.id,
    username:u,
    coins:0,
    is_admin:false,
    banned:false
  });

  if(insertError){
    alert("INSERT ERROR: "+insertError.message);
    return;
  }

  alert("Account created");
};

// LOGIN
window.loginUser=async()=>{
  const u=el("loginUsername").value;
  const p=el("password").value;

  const {data,error}=await supabase.auth.signInWithPassword({
    email:fakeEmail(u),password:p
  });

  if(error){alert("LOGIN ERROR: "+error.message);return;}

  user=data.user;

  const {data:rows}=await supabase.from("users").select("*").eq("id",user.id);
  const me=rows[0];

  if(me.banned){alert("You are banned");return;}

  coins=me.coins||0;
  isAdmin=me.is_admin;

  if(isAdmin){
    el("adminPanel").style.display="block";
    loadUsers();
  }

  updateUI();
  showDashboard();
};

// ADMIN
async function loadUsers(){
  const {data}=await supabase.from("users").select("*");
  el("adminUsers").innerHTML="";

  data.forEach(u=>{
    const d=document.createElement("div");
    d.className="userBox";
    d.innerHTML=`
      ${u.username} (${u.coins})
      <input id="c-${u.id}">
      <button onclick="setCoins('${u.id}')">Set</button>
      <button onclick="ban('${u.id}',${u.banned})">
        ${u.banned?"Unban":"Ban"}
      </button>
    `;
    el("adminUsers").appendChild(d);
  });
}

window.setCoins=async(id)=>{
  if(!isAdmin)return;

  const v=parseFloat(el("c-"+id).value);
  if(isNaN(v)) return;

  await supabase.from("users").update({coins:v}).eq("id",id);

  if(user && id===user.id){
    coins=v;
    updateUI();
    animateCoins();
  }

  loadUsers();
};

window.ban=async(id,b)=>{
  if(!isAdmin)return;
  if(id===user.id){alert("Can't ban yourself");return;}
  await supabase.from("users").update({banned:!b}).eq("id",id);
  loadUsers();
};

// GAME
window.openGame=async()=>{
  if(coins<25){
    el("gameMessage").innerText="Need 25 coins";
    return;
  }

  coins-=25;
  updateUI();
  animateCoins();

  await supabase.from("users").update({coins}).eq("id",user.id);

  window.open("https://epsteinclicker.github.io/","_blank");
};

// 🔥 LIVE UPDATES
supabase
  .channel('coins-changes')
  .on(
    'postgres_changes',
    { event:'UPDATE', schema:'public', table:'users' },
    payload=>{
      if(user && payload.new.id===user.id){
        coins = payload.new.coins;
        updateUI();
        animateCoins();
      }
    }
  )
  .subscribe();

</script>

</body>
</html>
