<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSMG - Game Hub</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
  display:flex;
}

.sidebar{
  width:220px;
  background:#020617;
  border-right:1px solid #1e293b;
  padding:20px;
  height:100vh;
}
.sidebar button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

.main{flex:1;padding:20px;}

.card{background:#0f172a;padding:15px;margin:10px 0;border-radius:10px;}
.userBox{background:#1e293b;padding:10px;margin:10px 0;border-radius:10px;}

.gameGrid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.gameCard{
  background:#0f172a;
  padding:15px;
  border-radius:12px;
  text-align:center;
}

.gameImg{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>BSMG</h2>
  <button onclick="showDashboard()">Dashboard</button>
  <button onclick="showGames()">Games</button>
  <button onclick="showLogin()">Login</button>
  <button onclick="showSignup()">Signup</button>
</div>

<div class="main">

<div id="dashboard">
  <h1>Big Steins Games</h1>
  <div class="card">🪙 Coins: <span id="coins">0</span></div>

  <div id="adminPanel" class="card" style="display:none;">
    <h3>Admin Dashboard</h3>
    <div id="adminUsers"></div>

    <h3>Game Prices</h3>

    <div class="userBox">
      Clicker:
      <input id="set-clicker">
      <button onclick="setPrice('clicker')">Set</button>
    </div>

    <div class="userBox">
      Kart:
      <input id="set-kart">
      <button onclick="setPrice('kart')">Set</button>
    </div>

    <div class="userBox">
      Survival:
      <input id="set-survival">
      <button onclick="setPrice('survival')">Set</button>
    </div>
  </div>
</div>

<div id="games" style="display:none;">
  <h2>🎮 Game Library</h2>

  <div class="gameGrid">

    <div class="gameCard">
      <h3>Big Stein Clicker</h3>
      <p>Cost: <span id="price-clicker">0</span></p>
      <button onclick="openGame()">Play</button>
    </div>

    <div class="gameCard">
      <h3>Kart Racing</h3>
      <p>Cost: <span id="price-kart">0</span></p>
      <button onclick="openKart()">Play</button>
    </div>

    <div class="gameCard">
      <h3>Street Survival Simulator</h3>
      <p>Cost: <span id="price-survival">0</span></p>
      <button onclick="openSurvival()">Play</button>
    </div>

  </div>

  <p id="gameMessage"></p>
</div>

<div id="login" style="display:none;" class="card">
  <input id="loginUsername" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="loginUser()">Login</button>
</div>

<div id="signup" style="display:none;" class="card">
  <input id="username" placeholder="Username">
  <input id="newPassword" type="password" placeholder="Password">
  <button onclick="signupUser()">Signup</button>
</div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://wcexpxchtcsalxbjizmn.supabase.co",
  "sb_publishable_i7VgJlJ5CuO-LblxQ67ItQ_kR9KGkat"
);

let user=null, coins=0, isAdmin=false, prices={};

function el(id){return document.getElementById(id);}
function fakeEmail(u){return u.toLowerCase()+"@bsmg.local";}

function hideAll(){["dashboard","games","login","signup"].forEach(id=>el(id).style.display="none");}
window.showDashboard=()=>{hideAll();el("dashboard").style.display="block";}
window.showGames=()=>{hideAll();el("games").style.display="block";}
window.showLogin=()=>{hideAll();el("login").style.display="block";}
window.showSignup=()=>{hideAll();el("signup").style.display="block";}

function updateUI(){el("coins").innerText=coins;}

async function loadPrices(){
  const {data}=await supabase.from("games").select("*");
  if(!data){alert("Prices not loaded");return;}
  data.forEach(g=>prices[g.id]=g.price);

  el("price-clicker").innerText=prices.clicker||0;
  el("price-kart").innerText=prices.kart||0;
  el("price-survival").innerText=prices.survival||0;
}

// 🔥 FIX ADDED HERE
async function loadUsers(){
  const { data } = await supabase.from("users").select("*");
  if(!data) return;

  el("adminUsers").innerHTML = "";

  data.forEach(u=>{
    el("adminUsers").innerHTML += `
    <div class="userBox">
      ${u.username} (${u.coins})
      <input id="c-${u.id}">
      <button onclick="setCoins('${u.id}')">Set</button>
    </div>`;
  });
}

window.signupUser=async()=>{
  const u=el("username").value;
  const p=el("newPassword").value;

  const {data,error}=await supabase.auth.signUp({email:fakeEmail(u),password:p});
  if(error){alert(error.message);return;}

  await supabase.from("users").insert({
    id:data.user.id,username:u,coins:0,is_admin:false,banned:false
  });

  alert("Account created");
};

window.loginUser=async()=>{
  const u=el("loginUsername").value;
  const p=el("password").value;

  const {data,error}=await supabase.auth.signInWithPassword({
    email:fakeEmail(u),password:p
  });

  if(error){alert(error.message);return;}

  user=data.user;

  const {data:rows}=await supabase.from("users").select("*").eq("id",user.id);
  const me=rows[0];

  coins=me.coins||0;
  isAdmin=me.is_admin;

  if(isAdmin){
    el("adminPanel").style.display="block";
    loadUsers();
  }

  await loadPrices();

  updateUI();
  showDashboard();
};

window.setCoins=async(id)=>{
  const v=parseFloat(el("c-"+id).value);
  await supabase.from("users").update({coins:v}).eq("id",id);
  if(user && id===user.id){coins=v;updateUI();}
  loadUsers();
};

window.setPrice=async(id)=>{
  const v=parseFloat(el("set-"+id).value);
  await supabase.from("games").update({price:v}).eq("id",id);
  prices[id]=v;
  loadPrices();
};

window.openGame=async()=>{
  if(coins<prices.clicker){alert("Not enough coins");return;}
  coins-=prices.clicker;
  updateUI();
  await supabase.from("users").update({coins}).eq("id",user.id);
  window.location.href="https://epsteinclicker.github.io/";
};

window.openKart=async()=>{
  if(coins<prices.kart){alert("Not enough coins");return;}
  coins-=prices.kart;
  updateUI();
  await supabase.from("users").update({coins}).eq("id",user.id);
  window.location.href="https://mkpc.malahieude.net/";
};

window.openSurvival=async()=>{
  if(coins<prices.survival){alert("Not enough coins");return;}
  coins-=prices.survival;
  updateUI();
  await supabase.from("users").update({coins}).eq("id",user.id);
  window.location.href="survival.html";
};

</script>

</body>
</html>
